# TimesFM Sweep Config 07 — Low LR + long training
# Conservative LR with more epochs — common best practice for foundation models
model_type: "timesfm"
training_mode: "fine_tune"
context_length: 512
forecast_length: 96

# Training
learning_rate: 1.0e-5
num_epochs: 20
batch_size: 32
gradient_accumulation_steps: 4
weight_decay: 0.01
torch_dtype: "bfloat16"

# Data
target_col: "bg_mM"
interval_mins: 5
imputation_threshold_mins: 45
freq_type: 0
