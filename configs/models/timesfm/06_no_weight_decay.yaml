# TimesFM Sweep Config 06 — No weight decay
# Ablate weight decay to isolate its effect on fine-tuning
model_type: "timesfm"
training_mode: "fine_tune"
context_length: 512
forecast_length: 96

# Training
learning_rate: 1.0e-4
num_epochs: 10
batch_size: 256
gradient_accumulation_steps: 4
weight_decay: 0.0
torch_dtype: "bfloat16"

# Data
target_col: "bg_mM"
interval_mins: 5
imputation_threshold_mins: 45
freq_type: 0
