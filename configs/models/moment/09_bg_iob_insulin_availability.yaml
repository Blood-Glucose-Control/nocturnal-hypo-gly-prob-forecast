# MOMENT Sweep 09 - BG + IOB + Insulin Availability (best-guess)
model_path: "AutonLab/MOMENT-1-small"
training_mode: "fine_tune"
context_length: 512
forecast_length: 96
use_wrapper_normalization: false
covariate_cols: ["iob", "insulin_availability"]

learning_rate: 1.0e-4
batch_size: 16
num_epochs: 5

window_stride: 96
max_train_windows: 4096

target_col: "bg_mM"
interval_mins: 5
