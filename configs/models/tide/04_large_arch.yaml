# =============================================================================
# TiDE Config 04: Large architecture + IOB + insulin_availability
# =============================================================================
# Same covariates as 02 — larger dims/depth only. Isolates the effect of model
# capacity from covariate choice. Compare against 02 (same covariates, smaller
# arch) to determine whether extra capacity helps.
#
# Changes vs 02: hidden dims 256→512, layers 2→3, time_limit 1800→3600.
#
# Gauntlet usage:
#   CUDA_VISIBLE_DEVICES=0 MODEL_TYPE="tide" \
#     MODEL_CONFIG="configs/models/tide/04_large_arch.yaml" \
#     CONFIG_DIR="configs/data/holdout_10pct" \
#     DATASETS="lynch_2022 aleppo_2017 brown_2019 tamborlane_2008" \
#     SKIP_TRAINING="false" \
#     ./scripts/examples/run_holdout_generic_workflow.sh
# =============================================================================

model_type: "tide"
training_mode: "from_scratch"
context_length: 512
forecast_length: 96

# TiDE architecture — larger dims, deeper
encoder_hidden_dim: 512
decoder_hidden_dim: 512
temporal_hidden_dim: 512
num_layers_encoder: 3
num_layers_decoder: 3
distr_hidden_dim: 16
layer_norm: true
decoder_output_dim: 32
dropout: 0.1
scaling: "mean"

# Training
lr: 9.31e-4
num_batches_per_epoch: 300
batch_size: 256
gradient_clip_val: 1.0
precision: "16-mixed"
early_stopping_patience: 20
max_epochs: 100

# Gap handling
imputation_threshold_mins: 45

# Covariates — same as 02, not 03
covariate_cols: ["iob", "insulin_availability"]
target_col: "bg_mM"
patient_col: "p_num"
time_col: "datetime"
interval_mins: 5

# AutoGluon
eval_metric: "WQL"
enable_ensemble: false
time_limit: 3600
