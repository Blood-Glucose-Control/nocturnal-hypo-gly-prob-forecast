# =============================================================================
# TiDE Config 00: BG only, baseline architecture
# =============================================================================
# Minimal baseline — no covariates, standard architecture dims, 1800s time limit.
# Use as the performance floor for comparing covariate and architecture configs.
#
# Gauntlet usage:
#   CUDA_VISIBLE_DEVICES=0 MODEL_TYPE="tide" \
#     MODEL_CONFIG="configs/models/tide/00_bg_only.yaml" \
#     CONFIG_DIR="configs/data/holdout_10pct" \
#     DATASETS="lynch_2022 aleppo_2017 brown_2019 tamborlane_2008" \
#     SKIP_TRAINING="false" \
#     ./scripts/examples/run_holdout_generic_workflow.sh
# =============================================================================

model_type: "tide"
training_mode: "from_scratch"
context_length: 512
forecast_length: 96

# TiDE architecture
encoder_hidden_dim: 256
decoder_hidden_dim: 256
temporal_hidden_dim: 256
num_layers_encoder: 2
num_layers_decoder: 2
distr_hidden_dim: 8
dropout: 0.1
scaling: "mean"

# Training
lr: 9.31e-4
num_batches_per_epoch: 300
batch_size: 256
gradient_clip_val: 1.0
precision: "16-mixed"

# Gap handling
imputation_threshold_mins: 45

# Covariates
covariate_cols: []
target_col: "bg_mM"
patient_col: "p_num"
time_col: "datetime"
interval_mins: 5

# AutoGluon
eval_metric: "WQL"
enable_ensemble: false
time_limit: 1800
