# =============================================================================
# TTM (TinyTimeMixer) - Fine-Tuning Configuration: IOB only
# =============================================================================
# 2-channel input: bg_mM (target) + iob (covariate).
# Use this checkpoint for IOB evals on aleppo_2017, brown_2019, lynch_2022.
# =============================================================================

model_path: "ibm-granite/granite-timeseries-ttm-r2"
context_length: 512
forecast_length: 96

training_mode: "fine_tune"
freeze_backbone: false
learning_rate: 1.0e-4
batch_size: 8192
num_epochs: 5
warmup_steps: 1000
weight_decay: 0.01

input_features:
  - iob

target_features:
  - bg_mM

scaler_type: "standard"
resolution_min: 5

split_config:
  train: 0.9
  val: 0.05
  test: 0.05

num_input_channels: 2
num_output_channels: 1

fp16: true
loss_function: "mse"
