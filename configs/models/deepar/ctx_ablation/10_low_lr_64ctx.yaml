# =============================================================================
# DeepAR Config 10: low_lr — Context Ablation 64ctx
# =============================================================================
# Winner config (10_low_lr) with context_length reduced to 64.
# All other hyperparameters identical to 10_low_lr.yaml.
# =============================================================================

model_type: "deepar"
training_mode: "from_scratch"
context_length: 64
forecast_length: 96

hidden_size: 64
num_layers: 2
dropout_rate: 0.1

lr: 0.0003
num_batches_per_epoch: 50
batch_size: 128
max_epochs: 100
early_stopping_patience: 20
gradient_clip_val: 10.0

covariate_cols: []
target_col: "bg_mM"
patient_col: "p_num"
time_col: "datetime"
interval_mins: 5

eval_metric: "WQL"
enable_ensemble: false
imputation_threshold_mins: 45
