# =============================================================================
# DeepAR Config 03: BG + IOB, short context (ctx ablation)
# =============================================================================
# Ablation: halve context window from 512 to 256 to measure context
# sensitivity. Mirrors the short-ctx ablation run for Chronos-2.
# Only run on datasets with IOB: aleppo_2017, brown_2019, lynch_2022.
# =============================================================================

model_type: "deepar"
training_mode: "from_scratch"
context_length: 256
forecast_length: 96

hidden_size: 64
num_layers: 2
dropout: 0.1
cell_type: "lstm"
distr_output: "StudentTOutput"

lr: 0.001
num_batches_per_epoch: 50
batch_size: 128
max_epochs: 100
early_stopping_patience: 20
gradient_clip_val: 10.0

covariate_cols: ["iob"]
target_col: "bg_mM"
patient_col: "p_num"
time_col: "datetime"
interval_mins: 5

eval_metric: "WQL"
enable_ensemble: false
imputation_threshold_mins: 45
