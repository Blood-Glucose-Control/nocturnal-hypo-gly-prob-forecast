# =============================================================================
# Chronos-2  06 — CGM + IOB + COB  (baseline carb addition)
# =============================================================================
# Adds carbohydrate-on-board (COB, from the Hovorka carb absorption model) to
# the IOB covariate. This is the baseline carb config — clean comparison point
# for the CGM+Insulin+Carbs group.
#
# Datasets: aleppo_2017 only
# (Only aleppo_2017 has real carbohydrate data. lynch_2022 carb/COB columns are
#  all-zero throughout, so including it would train on uninformative COB signal.
#  brown_2019: no meal data in DCLP3 export. tamborlane_2008: CGM-only.)
#
# Comparison target:
#   02_bg_iob.yaml  → insulin only (no carbs)
#   THIS config     → insulin + carbs (baseline carb addition)
#
# Usage:
#   MODEL_TYPE="chronos2" \
#   MODEL_CONFIG="configs/models/chronos2/06_bg_iob_cob.yaml" \
#   DATASETS="aleppo_2017" \
#   SKIP_TRAINING="false" \
#     ./scripts/examples/run_holdout_generic_workflow.sh
# =============================================================================

model_path: "autogluon/chronos-2"
context_length: 512
forecast_length: 96  # 8 hours at 5-min intervals

training_mode: "fine_tune"
freeze_backbone: false

fine_tune_steps: 10000
fine_tune_lr: 1.0e-5
fine_tune_batch_size: 256  # RTX Pro 6000 Blackwell 96GB; T5-small 256→~45GB (verified safe)
checkpoint_save_steps: 2000

covariate_cols: [iob, cob]
target_col: "bg_mM"
patient_col: "p_num"
time_col: "datetime"
interval_mins: 5

eval_metric: "WQL"
enable_ensemble: false
