# =============================================================================
# Chronos-2 - CGM + IOB + COB  (baseline carb addition)
# =============================================================================
# Adds carbohydrate-on-board (COB, from the Hovorka carb absorption model) to
# the IOB covariate. This is the baseline carb config — clean comparison point
# for the CGM+Insulin+Carbs group.
#
# Datasets: aleppo_2017, lynch_2022
# (Both have food_g / MealSize data → COB computable. Exclude brown_2019: no
#  meal data in DCLP3 export. Exclude tamborlane_2008: CGM-only.)
#
# Comparison target:
#   02_bg_iob.yaml  → insulin only (no carbs)
#   THIS config     → insulin + carbs (baseline carb addition)
#
# Usage:
#   MODEL_TYPE="chronos2" \
#   MODEL_CONFIG="configs/models/chronos2/05_bg_iob_cob.yaml" \
#   DATASETS="aleppo_2017 lynch_2022" \
#   SKIP_TRAINING="false" \
#     ./scripts/examples/run_holdout_generic_workflow.sh
# =============================================================================

model_path: "autogluon/chronos-2"
context_length: 512
forecast_length: 96  # 8 hours at 5-min intervals

training_mode: "fine_tune"
freeze_backbone: false

fine_tune_steps: 50000
fine_tune_lr: 1.0e-5
fine_tune_batch_size: 256  # default=32; GPU has ~96GB VRAM, 32→~4GB so 256→~32GB

covariate_cols: [iob, cob]
target_col: "bg_mM"
patient_col: "p_num"
time_col: "datetime"
interval_mins: 5

eval_metric: "RMSE"
enable_ensemble: false
