# =============================================================================
# Chronos-2 config 03 — SMOKETEST for periodic checkpoint saving
# 200 fine-tune steps, checkpoint every 100 steps
# Use this to verify that snapshot materialisation works before kicking off
# the full 250k run.
# =============================================================================

model_path: "autogluon/chronos-2"
context_length: 512
forecast_length: 96

training_mode: "fine_tune"
freeze_backbone: false

fine_tune_steps: 200
fine_tune_lr: 5.0e-5
fine_tune_batch_size: 128

checkpoint_save_steps: 100

covariate_cols: [iob, insulin_availability]
target_col: "bg_mM"
patient_col: "p_num"
time_col: "datetime"
interval_mins: 5

eval_metric: "RMSE"
enable_ensemble: false
