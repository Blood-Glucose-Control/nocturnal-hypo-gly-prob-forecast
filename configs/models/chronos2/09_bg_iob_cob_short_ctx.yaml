# =============================================================================
# Chronos-2  09 — CGM + IOB + COB  |  context = 288 (~24h)
# =============================================================================
# Same covariate set as 05_bg_iob_cob.yaml but with a reduced context window
# of 288 steps (~24h). Mirrors the short-context experiment from the
# CGM+Insulin group (04 vs 01) applied to the CGM+Insulin+Carbs group.
#
# Rationale: reduces BG autocorrelation dominance (driver-blindness C1), which
# may allow the model to use carb and insulin covariates more effectively.
#
# Note: min_segment_length auto-computes to context_length + forecast_length
#       = 288 + 96 = 384 rows per segment (Chronos2Config.__post_init__).
#
# Datasets: aleppo_2017 only
# (lynch_2022 carb/COB columns are all-zero; excluded to avoid uninformative COB signal.)
#
# Comparison target:
#   06_bg_iob_cob.yaml  → same covariates, context=512
#   THIS config         → same covariates, context=288
#   05_bg_iob_short_ctx → insulin-only at context=288 (cross-group comparison)
#
# Usage:
#   MODEL_TYPE="chronos2" \
#   MODEL_CONFIG="configs/models/chronos2/09_bg_iob_cob_short_ctx.yaml" \
#   DATASETS="aleppo_2017" \
#   SKIP_TRAINING="false" \
#     ./scripts/examples/run_holdout_generic_workflow.sh
# =============================================================================

model_path: "autogluon/chronos-2"
context_length: 288  # ~24h at 5-min intervals (vs 512 ~42h baseline)
forecast_length: 96  #  hours at 5-min intervals

training_mode: "fine_tune"
freeze_backbone: false

fine_tune_steps: 10000
fine_tune_lr: 1.0e-5
fine_tune_batch_size: 256  # RTX Pro 6000 Blackwell 96GB; T5-small 256→~45GB (verified safe)
checkpoint_save_steps: 2000

covariate_cols: [iob, cob]
target_col: "bg_mM"
patient_col: "p_num"
time_col: "datetime"
interval_mins: 5

eval_metric: "WQL"
enable_ensemble: false
