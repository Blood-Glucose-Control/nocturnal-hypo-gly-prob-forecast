# =============================================================================
# Chronos-2  01 — IOB + insulin_availability  |  lr=1e-5  |  ctx=512  (existing baseline)
# =============================================================================
# Existing covariate baseline — IOB and insulin_availability as covariates.
# Reference point for covariate contribution experiments (02, 04, 05).
#
# Datasets: aleppo_2017, brown_2019, lynch_2022
#
# Usage:
#   MODEL_TYPE="chronos2" \
#   MODEL_CONFIG="configs/models/chronos2/01_bg_iob_insulin_availability.yaml" \
#   DATASETS="aleppo_2017 brown_2019 lynch_2022" \
#   SKIP_TRAINING="false" \
#     ./scripts/examples/run_holdout_generic_workflow.sh
# =============================================================================

model_path: "autogluon/chronos-2"
context_length: 512
forecast_length: 96  # 6 hours at 5-min intervals

training_mode: "fine_tune"
freeze_backbone: false

# Step-based training (Chronos-2 / AutoGluon does not use epochs directly).
# 100 steps = fast smoke test. Use ~15000 for a real training run.
fine_tune_steps: 10000
fine_tune_lr: 1.0e-5
fine_tune_batch_size: 256  # RTX Pro 6000 Blackwell 96GB; T5-small 256→~45GB (verified safe)
checkpoint_save_steps: 2000

covariate_cols: [iob, insulin_availability]
target_col: "bg_mM"
patient_col: "p_num"
time_col: "datetime"
interval_mins: 5

eval_metric: "WQL"
enable_ensemble: false
