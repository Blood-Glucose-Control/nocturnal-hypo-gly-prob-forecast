# =============================================================================
# Chronos-2  15 — CGM + IOB + COB  |  LR = 5e-5  |  ctx = 64
# =============================================================================
# Context window ablation of 08_bg_iob_cob_high_lr at 64 steps (~5.3h).
# Uses the same high-LR COB covariate set as the COB sweep winner (08) to
# isolate the effect of context window length with LR held at 5e-5.
#
# Context ablation ladder (high-LR COB):
#   08_bg_iob_cob_high_lr.yaml          → ctx=512 (~42.7h)   [baseline]
#   13_bg_iob_cob_high_lr_ctx256.yaml   → ctx=256 (~21.3h)
#   14_bg_iob_cob_high_lr_ctx128.yaml   → ctx=128 (~10.7h)
#   THIS config                          → ctx=64  (~5.3h)
#
# Datasets: aleppo_2017 only
# (lynch_2022 carb/COB columns are all-zero — excluded to avoid uninformative signal.)
#
# Usage:
#   MODEL_TYPE="chronos2" \
#   MODEL_CONFIG="configs/models/chronos2/15_bg_iob_cob_high_lr_ctx64.yaml" \
#   DATASETS="aleppo_2017" \
#   SKIP_TRAINING="false" \
#     ./scripts/examples/run_holdout_generic_workflow.sh
# =============================================================================

model_path: "autogluon/chronos-2"
context_length: 64   # ~5.3h at 5-min intervals (2^6)
forecast_length: 96  # 8 hours at 5-min intervals

training_mode: "fine_tune"
freeze_backbone: false

fine_tune_steps: 10000
fine_tune_lr: 5.0e-5
fine_tune_batch_size: 256  # RTX Pro 6000 Blackwell 96GB; T5-small 256→~45GB (verified safe)
checkpoint_save_steps: 2000

covariate_cols: [iob, cob]
target_col: "bg_mM"
patient_col: "p_num"
time_col: "datetime"
interval_mins: 5

eval_metric: "WQL"
enable_ensemble: false
