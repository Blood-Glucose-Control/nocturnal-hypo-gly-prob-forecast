# =============================================================================
# Chronos-2  00 — BG only  |  lr=1e-5  |  ctx=512  (baseline)
# =============================================================================
# BG-only baseline — no covariates. Reference point for all other configs.
# 10k steps with checkpoints every 2k lets you see the learning curve and
# compare convergence speed against covariate configs.
#
# Datasets: aleppo_2017, brown_2019, lynch_2022
#
# Usage:
#   MODEL_TYPE="chronos2" \
#   MODEL_CONFIG="configs/models/chronos2/00_bg_only.yaml" \
#   DATASETS="aleppo_2017 brown_2019 lynch_2022" \
#   SKIP_TRAINING="false" \
#     ./scripts/examples/run_holdout_generic_workflow.sh
# =============================================================================

model_path: "autogluon/chronos-2"
context_length: 512
forecast_length: 96  # 6 hours at 5-min intervals

training_mode: "fine_tune"
freeze_backbone: false

# Step-based training (Chronos-2 / AutoGluon does not use epochs directly).
# 100 steps = fast smoke test. Use ~15000 for a real training run.
fine_tune_steps: 10000
fine_tune_lr: 1.0e-5
fine_tune_batch_size: 256  # RTX Pro 6000 Blackwell 96GB; T5-small 256→~45GB (verified safe)
checkpoint_save_steps: 2000

# BG only — no covariates
covariate_cols: []
target_col: "bg_mM"
patient_col: "p_num"
time_col: "datetime"
interval_mins: 5

eval_metric: "WQL"
enable_ensemble: false
