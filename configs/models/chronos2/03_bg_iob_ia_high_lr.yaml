# =============================================================================
# Chronos-2 - CGM + IOB + insulin_availability  |  LR = 5e-5  (high LR)
# =============================================================================
# Same covariate set as 01_bg_iob_insulin_availability.yaml but with 5× higher
# learning rate. Tests whether the near-zero ΔRMSE from IOB covariates in 01
# (1.6%) is partly explained by the LR being too small for the model to weight
# exogenous signals — a known issue with fine-tuning large pre-trained models
# on new input channels.
#
# Datasets: aleppo_2017, brown_2019, lynch_2022
#
# Comparison target:
#   01_bg_iob_insulin_availability.yaml  → same covariates, lr=1e-5
#   THIS config                          → same covariates, lr=5e-5
#
# Usage:
#   MODEL_TYPE="chronos2" \
#   MODEL_CONFIG="configs/models/chronos2/03_bg_iob_ia_high_lr.yaml" \
#   DATASETS="aleppo_2017 brown_2019 lynch_2022" \
#   SKIP_TRAINING="false" \
#     ./scripts/examples/run_holdout_generic_workflow.sh
# =============================================================================

model_path: "autogluon/chronos-2"
context_length: 512
forecast_length: 96  # 8 hours at 5-min intervals

training_mode: "fine_tune"
freeze_backbone: false

fine_tune_steps: 50000
fine_tune_lr: 5.0e-5  # 5× higher than baseline; tests covariate uptake sensitivity
fine_tune_batch_size: 128  # default=32; GPU has ~96GB VRAM, 32→~4GB so 256→~32GB

covariate_cols: [iob, insulin_availability]
target_col: "bg_mM"
patient_col: "p_num"
time_col: "datetime"
interval_mins: 5

eval_metric: "RMSE"
enable_ensemble: false
