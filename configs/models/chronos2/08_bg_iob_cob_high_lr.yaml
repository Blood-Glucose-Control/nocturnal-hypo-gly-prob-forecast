# =============================================================================
# Chronos-2  08 — CGM + IOB + COB  |  LR = 5e-5  (high LR)
# =============================================================================
# Same covariate set as 05_bg_iob_cob.yaml but with 5× higher learning rate.
# Mirrors the LR sweep from the CGM+Insulin group (03 vs 01) applied to the
# CGM+Insulin+Carbs group — tests whether higher LR improves covariate uptake
# for carb features as well.
#
# Datasets: aleppo_2017 only
# (lynch_2022 carb/COB columns are all-zero; excluded to avoid uninformative COB signal.)
#
# Comparison target:
#   06_bg_iob_cob.yaml  → same covariates, lr=1e-5
#   THIS config         → same covariates, lr=5e-5
#
# Usage:
#   MODEL_TYPE="chronos2" \
#   MODEL_CONFIG="configs/models/chronos2/08_bg_iob_cob_high_lr.yaml" \
#   DATASETS="aleppo_2017" \
#   SKIP_TRAINING="false" \
#     ./scripts/examples/run_holdout_generic_workflow.sh
# =============================================================================

model_path: "autogluon/chronos-2"
context_length: 512
forecast_length: 96  # 8 hours at 5-min intervals

training_mode: "fine_tune"
freeze_backbone: false

fine_tune_steps: 10000
fine_tune_lr: 5.0e-5  # 5× higher than 06_bg_iob_cob baseline
fine_tune_batch_size: 256  # RTX Pro 6000 Blackwell 96GB; T5-small 256→~45GB (verified safe)
checkpoint_save_steps: 2000

covariate_cols: [iob, cob]
target_col: "bg_mM"
patient_col: "p_num"
time_col: "datetime"
interval_mins: 5

eval_metric: "WQL"
enable_ensemble: false
