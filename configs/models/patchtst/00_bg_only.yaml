# =============================================================================
# PatchTST Config 00: BG-only, default hyperparameters
# =============================================================================
# PatchTST tokenises the time series into overlapping patches and applies
# a Transformer encoder. No covariate support in the base AutoGluon
# implementation — BG series are modelled independently per patient.
# Natively probabilistic via Student-T head.
# GPU: ~6 GB peak at these defaults → 2 workers per 96 GB Blackwell GPU.
# =============================================================================

model_type: "patchtst"
training_mode: "from_scratch"
context_length: 512
forecast_length: 96

# Patch architecture
patch_len: 16
stride: 8
d_model: 128
nhead: 16
num_encoder_layers: 3
ffn_dim_multiplier: 4
dropout: 0.1

# Training
lr: 0.0001
num_batches_per_epoch: 100
batch_size: 256
max_epochs: 100
early_stopping_patience: 20

# PatchTST in AutoGluon does not use past covariates
covariate_cols: []
target_col: "bg_mM"
patient_col: "p_num"
time_col: "datetime"
interval_mins: 5

eval_metric: "WQL"
enable_ensemble: false
imputation_threshold_mins: 45
