# =============================================================================
# PatchTST Config 02: BG + IOB, higher learning rate
# =============================================================================
# Ablation: lr 1e-4 → 3e-4.
# Only run on datasets with IOB: aleppo_2017, brown_2019, lynch_2022.
# =============================================================================

model_type: "patchtst"
training_mode: "from_scratch"
context_length: 512
forecast_length: 96

patch_len: 16
stride: 8
d_model: 128
nhead: 16
num_encoder_layers: 3
ffn_dim_multiplier: 4
dropout: 0.1

lr: 0.0003
num_batches_per_epoch: 100
batch_size: 256
max_epochs: 100
early_stopping_patience: 20

covariate_cols: ["iob"]
target_col: "bg_mM"
patient_col: "p_num"
time_col: "datetime"
interval_mins: 5

eval_metric: "WQL"
enable_ensemble: false
imputation_threshold_mins: 45
