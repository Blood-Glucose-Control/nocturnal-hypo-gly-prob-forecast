# =============================================================================
# Moirai - Smoke Test Configuration
# =============================================================================
# Minimal fine-tuning config for a quick end-to-end smoke test.
# Uses the small model variant with minimal epochs and samples.

model_path: "Salesforce/moirai-1.0-R-small"
context_length: 512
forecast_length: 96  # 6 hours at 5-min intervals

# --- Training ---
training_mode: "fine_tune"
freeze_backbone: false
learning_rate: 1.0e-4
batch_size: 32
num_epochs: 2

# --- Inference ---
patch_size: "auto"
num_samples: 50  # reduced from 100 for speed

# --- Covariates ---
past_covariate_dim: 2
covariate_cols: [iob, insulin_availability]
target_col: "bg_mM"
interval_mins: 5

# --- Hardware ---
fp16: true
use_cpu: false
