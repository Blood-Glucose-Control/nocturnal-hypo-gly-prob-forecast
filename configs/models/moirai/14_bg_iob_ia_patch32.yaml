# =============================================================================
# Moirai — BG + IOB + IA  |  patch_size=32  |  lr=1e-4  |  ctx=512
# =============================================================================
# Larger patch (32 steps = 160 min ≈ 2.7 hrs).  Fewest tokens; each patch
# aggregates more temporal context which may smooth out CGM noise.
#   context tokens  = ceil(512 / 32) = 16
#   prediction tokens = ceil(96 / 32) = 3
# Compare against patch=8 (12) and patch=16 (13).
#
# Usage:
#   CUDA_VISIBLE_DEVICES=0 MODEL_TYPE="moirai" \
#   MODEL_CONFIG="configs/models/moirai/14_bg_iob_ia_patch32.yaml" \
#   CONFIG_DIR="configs/data/holdout_10pct" \
#   DATASETS="aleppo_2017 brown_2019 lynch_2022 tamborlane_2008" \
#   SKIP_TRAINING="false" SKIP_STEPS="7" \
#     ./scripts/examples/run_holdout_generic_workflow.sh
# =============================================================================

model_path: "Salesforce/moirai-1.0-R-small"
context_length: 512
forecast_length: 96

training_mode: "fine_tune"
freeze_backbone: false
learning_rate: 1.0e-4
batch_size: 32
num_epochs: 5

patch_size: 32
num_samples: 50

past_covariate_dim: 2
covariate_cols: [iob, insulin_availability]
target_col: "bg_mM"
interval_mins: 5

fp16: true
use_cpu: false
