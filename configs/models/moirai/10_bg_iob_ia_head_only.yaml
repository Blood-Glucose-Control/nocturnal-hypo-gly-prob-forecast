# =============================================================================
# Moirai — BG + IOB + IA  |  finetune_pattern=head_only  |  lr=1e-4
# =============================================================================
# Only trains the output projection head (param_proj); all transformer
# layers are frozen.  This is linear probing — fast, and a strong baseline
# to see how much the pretrained features already capture.
# Compare against 02 (full fine-tune, same covariates).
#
# Usage:
#   CUDA_VISIBLE_DEVICES=0 MODEL_TYPE="moirai" \
#   MODEL_CONFIG="configs/models/moirai/10_bg_iob_ia_head_only.yaml" \
#   CONFIG_DIR="configs/data/holdout_10pct" \
#   DATASETS="aleppo_2017 brown_2019 lynch_2022 tamborlane_2008" \
#   SKIP_TRAINING="false" SKIP_STEPS="7" \
#     ./scripts/examples/run_holdout_generic_workflow.sh
# =============================================================================

model_path: "Salesforce/moirai-1.0-R-small"
context_length: 512
forecast_length: 96

training_mode: "fine_tune"
freeze_backbone: false
finetune_pattern: "head_only"
learning_rate: 1.0e-4
batch_size: 32
num_epochs: 5

patch_size: "auto"
num_samples: 50

past_covariate_dim: 2
covariate_cols: [iob, insulin_availability]
target_col: "bg_mM"
interval_mins: 5

fp16: true
use_cpu: false
