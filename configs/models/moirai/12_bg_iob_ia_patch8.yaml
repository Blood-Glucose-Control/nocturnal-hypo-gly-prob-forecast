# =============================================================================
# Moirai — BG + IOB + IA  |  patch_size=8  |  lr=1e-4  |  ctx=512
# =============================================================================
# Smallest patch (8 steps = 40 min).  Most fine-grained temporal resolution;
# gives the model the most tokens to attend over.
#   context tokens  = ceil(512 / 8)  = 64
#   prediction tokens = ceil(96 / 8) = 12
# Compare against "auto" (02) and larger patches (13, 14) to check if
# fine patches reduce or increase forecast noise.
#
# Usage:
#   CUDA_VISIBLE_DEVICES=0 MODEL_TYPE="moirai" \
#   MODEL_CONFIG="configs/models/moirai/12_bg_iob_ia_patch8.yaml" \
#   CONFIG_DIR="configs/data/holdout_10pct" \
#   DATASETS="aleppo_2017 brown_2019 lynch_2022 tamborlane_2008" \
#   SKIP_TRAINING="false" SKIP_STEPS="7" \
#     ./scripts/examples/run_holdout_generic_workflow.sh
# =============================================================================

model_path: "Salesforce/moirai-1.0-R-small"
context_length: 512
forecast_length: 96

training_mode: "fine_tune"
freeze_backbone: false
learning_rate: 1.0e-4
batch_size: 32
num_epochs: 5

patch_size: 8
num_samples: 50

past_covariate_dim: 2
covariate_cols: [iob, insulin_availability]
target_col: "bg_mM"
interval_mins: 5

fp16: true
use_cpu: false
