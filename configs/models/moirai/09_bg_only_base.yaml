# =============================================================================
# Moirai — BG only  |  lr=1e-4  |  ctx=512  |  moirai-1.0-R-base (91M)
# =============================================================================
# Same as 00_bg_only but uses the Base model (91M params) instead of
# Small (14M).  Compare against 00 to check model-size scaling.
#
# Usage:
#   CUDA_VISIBLE_DEVICES=0 MODEL_TYPE="moirai" \
#   MODEL_CONFIG="configs/models/moirai/09_bg_only_base.yaml" \
#   CONFIG_DIR="configs/data/holdout_10pct" \
#   DATASETS="aleppo_2017 brown_2019 lynch_2022 tamborlane_2008" \
#   SKIP_TRAINING="false" SKIP_STEPS="7" \
#     ./scripts/examples/run_holdout_generic_workflow.sh
# =============================================================================

model_path: "Salesforce/moirai-1.0-R-base"
context_length: 512
forecast_length: 96

training_mode: "fine_tune"
freeze_backbone: false
learning_rate: 1.0e-4
batch_size: 32
num_epochs: 5

patch_size: "auto"
num_samples: 50

past_covariate_dim: 0
covariate_cols: []
target_col: "bg_mM"
interval_mins: 5

fp16: true
use_cpu: false
