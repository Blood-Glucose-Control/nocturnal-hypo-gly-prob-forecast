# =============================================================================
# Moirai SMOKE TEST — BG only  |  2 epochs  |  50 samples
# =============================================================================
# Quick validation — BG-only baseline.
#
# Usage:
#   CUDA_VISIBLE_DEVICES=0 MODEL_TYPE="moirai" \
#   MODEL_CONFIG="configs/models/moirai/bg_only_smoke_test.yaml" \
#   CONFIG_DIR="configs/data/holdout_10pct" \
#   DATASETS="brown_2019" \
#   SKIP_TRAINING="false" SKIP_STEPS="7" \
#     ./scripts/examples/run_holdout_generic_workflow.sh
# =============================================================================

model_path: "Salesforce/moirai-1.0-R-small"
context_length: 512
forecast_length: 96

training_mode: "fine_tune"
freeze_backbone: false
learning_rate: 1.0e-4
batch_size: 32
num_epochs: 2

patch_size: "auto"
num_samples: 50

past_covariate_dim: 0
covariate_cols: []
target_col: "bg_mM"
interval_mins: 5

fp16: true
use_cpu: false
