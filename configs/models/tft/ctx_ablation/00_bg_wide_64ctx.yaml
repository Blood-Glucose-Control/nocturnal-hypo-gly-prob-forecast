# =============================================================================
# TFT Config 01: bg_wide — Context Ablation 64ctx
# =============================================================================
# Winner BG config (01_bg_wide) with context_length reduced to 64.
# All other hyperparameters identical to 01_bg_wide.yaml.
# =============================================================================

model_type: "tft"
training_mode: "from_scratch"
context_length: 64
forecast_length: 96

hidden_dim: 64
variable_dim: 32
num_heads: 4
dropout_rate: 0.1

lr: 0.001
num_batches_per_epoch: 50
batch_size: 256
max_epochs: 100
early_stopping_patience: 20
gradient_clip_val: 1.0

covariate_cols: []
target_col: "bg_mM"
patient_col: "p_num"
time_col: "datetime"
interval_mins: 5

eval_metric: "WQL"
enable_ensemble: false
imputation_threshold_mins: 45
