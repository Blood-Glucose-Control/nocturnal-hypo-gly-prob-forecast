# =============================================================================
# TFT Config 11: iob_high_lr — Context Ablation 64ctx
# =============================================================================
# Winner IOB config (11_iob_high_lr) with context_length reduced to 64.
# All other hyperparameters identical to 11_iob_high_lr.yaml.
# =============================================================================

model_type: "tft"
training_mode: "from_scratch"
context_length: 64
forecast_length: 96

hidden_dim: 32
variable_dim: 32
num_heads: 4
dropout_rate: 0.1

lr: 0.003
num_batches_per_epoch: 50
batch_size: 256
max_epochs: 100
early_stopping_patience: 20
gradient_clip_val: 1.0

covariate_cols: ["iob"]
target_col: "bg_mM"
patient_col: "p_num"
time_col: "datetime"
interval_mins: 5

eval_metric: "WQL"
enable_ensemble: false
imputation_threshold_mins: 45
