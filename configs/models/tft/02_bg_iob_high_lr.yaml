# =============================================================================
# TFT Config 02: BG + IOB, higher learning rate
# =============================================================================
# Ablation: lr 1e-3 → 3e-3.
# Only run on datasets with IOB: aleppo_2017, brown_2019, lynch_2022.
# =============================================================================

model_type: "tft"
training_mode: "from_scratch"
context_length: 512
forecast_length: 96

hidden_size: 64
num_heads: 4
dropout: 0.1

lr: 0.003
num_batches_per_epoch: 50
batch_size: 256
max_epochs: 100
early_stopping_patience: 20
gradient_clip_val: 1.0

covariate_cols: ["iob"]
target_col: "bg_mM"
patient_col: "p_num"
time_col: "datetime"
interval_mins: 5

eval_metric: "WQL"
enable_ensemble: false
imputation_threshold_mins: 45
